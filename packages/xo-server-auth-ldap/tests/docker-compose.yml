# Two independent LDAP servers for local testing, plus a failover replica of primary.
#
# Start: docker compose up -d
# Stop:  docker compose down -v
#
# Primary         ldap://localhost:1389  base: dc=example,dc=com
#   users:        alice / alice123 , bob / bob123
#   groups:       cn=developers,ou=groups,dc=example,dc=com  (members: alice, bob)
#
# Primary-failover ldap://localhost:1391  same data as primary (replica for failover testing)
#
# Secondary       ldap://localhost:1390  base: dc=customers,dc=com
#   users:        charlie / charlie123
#   groups:       cn=clients,ou=groups,dc=customers,dc=com  (members: charlie)
#
# Bind DN for all: cn=admin,dc=<domain>
# Bind password:   adminpassword
#
# Suggested test-cli config:
#   URI:             ldap://localhost:1389
#   Base:            dc=example,dc=com
#   Credentials DN:  cn=admin,dc=example,dc=com
#   Credentials PW:  adminpassword
#   User filter:     (uid={{name}})
#   ID attribute:    uid
#   Groups base:     ou=groups,dc=example,dc=com
#   Groups filter:   (objectClass=posixGroup)
#   Groups ID attr:  cn
#   Groups name attr:cn
#   Members mapping: groupAttribute=memberUid, userAttribute=uid

services:
  ldap-primary:
    image: bitnamilegacy/openldap:latest
    ports:
      - '1389:1389'
    environment:
      LDAP_ROOT: dc=example,dc=com
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: adminpassword
    volumes:
      - ./ldif/primary.ldif:/ldifs/primary.ldif:ro

  ldap-primary-failover:
    image: bitnamilegacy/openldap:latest
    ports:
      - '1391:1389'
    environment:
      LDAP_ROOT: dc=example,dc=com
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: adminpassword
    volumes:
      - ./ldif/primary.ldif:/ldifs/primary.ldif:ro

  ldap-secondary:
    image: bitnamilegacy/openldap:latest
    ports:
      - '1390:1389'
    environment:
      LDAP_ROOT: dc=customers,dc=com
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: adminpassword
    volumes:
      - ./ldif/secondary.ldif:/ldifs/secondary.ldif:ro
